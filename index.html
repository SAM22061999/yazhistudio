<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazhi Studio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 100vh;
            background-image: url("assets/hero/hero1.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero-overlay {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 12px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* ===== SECTION ===== */
        section {
            padding: 60px 20px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        section h2 {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        /* ===== GALLERY ===== */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            font-size: 0.9rem;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }

            .hero p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- HERO -->
    <div class="hero">
        <div class="hero-overlay">
            <h1>Yazhi Studio</h1>
            <p>Creative Design | Photography | Digital Branding</p>
        </div>
    </div>

    <!-- ABOUT -->
    <section>
        <h2>About Us</h2>
        <p>
            Yazhi Studio delivers creative visual solutions including photography,
            branding, and digital design. We focus on quality, creativity, and detail.
        </p>
    </section>

    <!-- GALLERY -->
    <section>
        <h2>Our Work</h2>
        <div class="gallery">
            <img src="assets/hero/hero1.jpg" alt="Hero Image 1">
            <img src="assets/hero/hero2.jpg" alt="Hero Image 2">
            <img src="assets/hero/hero3.jpg" alt="Hero Image 3">
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        © 2026 Yazhi Studio. All Rights Reserved.
    </footer>

</body>
</html>
